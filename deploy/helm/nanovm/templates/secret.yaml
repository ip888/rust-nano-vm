{{/*
Only render the chart-managed Secret when `existingSecret` is empty.
Operators that bring their own Secret (sealed-secrets, ESO, …) point
`existingSecret` at it and skip this resource entirely.
*/}}
{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nanovm.secretName" . }}
  labels:
    {{- include "nanovm.labels" . | nindent 4 }}
type: Opaque
stringData:
  NANOVM_API_TOKENS: {{ .Values.apiTokens | quote }}
{{- end }}
