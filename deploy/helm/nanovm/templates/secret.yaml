{{/*
Tokens Secret. Render only when the operator is NOT bringing their own
Secret via `tokensSecret.existingSecret` — in that case the Deployment
will mount their Secret directly and this chart stays out of the way
(no Helm-ownership conflict with sealed-secrets / ExternalSecrets).

We also fail fast if `config.apiTokens` is empty AND no `existingSecret`
is provided, so the chart never silently ships an auth-disabled
deployment.
*/}}
{{- if not .Values.tokensSecret.existingSecret }}
{{- if not .Values.config.apiTokens }}
{{- fail "config.apiTokens is empty and tokensSecret.existingSecret is not set — set one. Auth-disabled deployments must opt in explicitly via config.apiTokens=\"NONE\"." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nanovm.fullname" . }}-tokens
  labels:
    {{- include "nanovm.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Special-case literal `NONE` → empty bearer set (auth disabled).
  # Anything else → passed through verbatim. The fail-fast above keeps
  # operators from doing this by accident.
  NANOVM_API_TOKENS: {{ ternary "" .Values.config.apiTokens (eq .Values.config.apiTokens "NONE") | quote }}
{{- end }}
