{{/*
Guard: kvm.enabled (hostPath /dev/kvm) and kvm.devicePluginRequest
(kubelet device-plugin resource) are mutually exclusive shapes. Fail
fast at render time if both are set so the operator doesn't get a
confused running pod.
*/}}
{{- if and .Values.kvm.enabled (gt (int .Values.kvm.devicePluginRequest) 0) -}}
{{- fail "kvm.enabled and kvm.devicePluginRequest are mutually exclusive — pick exactly one" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nanovm.fullname" . }}
  labels:
    {{- include "nanovm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nanovm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nanovm.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the deployment when the tokens secret changes.
        checksum/tokens-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- if and .Values.kvm.enabled (gt (int .Values.kvm.devicePluginRequest) 0) }}
      {{- fail "Values.kvm.enabled and Values.kvm.devicePluginRequest are mutually exclusive; enable exactly one" }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.config.rustLog | quote }}
            - name: NANOVM_CONTROL_PLANE_ADDR
              value: "0.0.0.0:8080"
            - name: NANOVM_FORK_QUOTA_PER_SEC
              value: {{ .Values.config.forkQuotaPerSec | quote }}
            - name: NANOVM_AUDIT_LOG
              value: {{ .Values.config.auditPath | quote }}
            {{- if .Values.config.sandboxSnapshotId }}
            - name: NANOVM_SANDBOX_SNAPSHOT_ID
              value: {{ .Values.config.sandboxSnapshotId | quote }}
            {{- end }}
            {{- if .Values.config.warmPoolPerSnapshot }}
            - name: NANOVM_WARM_POOL_PER_SNAPSHOT
              value: {{ .Values.config.warmPoolPerSnapshot | quote }}
            {{- end }}
            {{- if .Values.config.snapshotStore }}
            - name: NANOVM_SNAPSHOT_STORE
              value: {{ .Values.config.snapshotStore | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "nanovm.secretName" . }}
          {{- $resources := deepCopy .Values.resources }}
          {{- if gt (int .Values.kvm.devicePluginRequest) 0 }}
          {{- $kvmReq := int .Values.kvm.devicePluginRequest }}
          {{- $_ := set $resources "limits" (merge (default (dict) (get $resources "limits")) (dict "devices.kvm.com/kvm" $kvmReq)) }}
          {{- $_ := set $resources "requests" (merge (default (dict) (get $resources "requests")) (dict "devices.kvm.com/kvm" $kvmReq)) }}
          {{- end }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          volumeMounts:
            - name: audit-log
              mountPath: /var/log/nanovm
            {{- if .Values.kvm.enabled }}
            - name: dev-kvm
              mountPath: /dev/kvm
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
      volumes:
        - name: audit-log
          emptyDir: {}
        {{- if .Values.kvm.enabled }}
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        {{- end }}
