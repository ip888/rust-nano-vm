# Local-KVM variant. Same Prometheus + Grafana as the Fly.io compose,
# PLUS a third `control-plane` container running the real
# nanovm-control-plane-kvm binary with /dev/kvm mapped in. Everything
# on one bridge network so Prometheus scrapes over the compose-internal
# hostname (`control-plane:8080`), no HTTPS, no public URL.
#
# Run through `../up-local.sh`, not directly — the wrapper generates
# fresh per-org tokens and passes them as env vars.
#
# HARD REQUIREMENT: your host has a working /dev/kvm. `up-local.sh`
# checks this before starting.

services:
  control-plane:
    image: ghcr.io/ip888/nanovm-control-plane-kvm:latest
    container_name: nanovm-demo-control-plane
    restart: unless-stopped
    ports:
      # Expose to the host loopback only — this container serves
      # bearer-authenticated microVM control-plane traffic, which
      # you don't want reachable from your LAN by default.
      - "127.0.0.1:8080:8080"
    # Real /dev/kvm from the host — this is what makes the demo real.
    devices:
      - /dev/kvm:/dev/kvm
    # The KVM binary needs the `kvm` group to open /dev/kvm.
    # up-local.sh discovers the host's kvm GID and injects it.
    group_add:
      - "${KVM_GID}"
    environment:
      NANOVM_CONTROL_PLANE_ADDR: "0.0.0.0:8080"
      RUST_LOG: "info,tower_http=info"
      NANOVM_LOG_FORMAT: "json"
      NANOVM_BACKEND_LABEL: "kvm"
      # Tokens minted by up-local.sh and passed through here.
      NANOVM_API_TOKENS: "${NANOVM_API_TOKENS}"
      # Same quotas as the Fly.io variant so `load.sh` visibly trips
      # the throttle on the noisy tenant.
      NANOVM_FORK_RPS: "5"
      NANOVM_FORK_BURST: "10"
      NANOVM_WARM_POOL_PER_SNAPSHOT: "4"
      NANOVM_AUDIT_LOG: "/var/log/nanovm/audit.jsonl"
    volumes:
      # Persist the audit log outside the container so `tail-local.sh`
      # can `tail -F` it from the host.
      - nanovm-audit:/var/log/nanovm
    healthcheck:
      test: ["CMD", "/usr/local/bin/nanovm-control-plane", "--version"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: nanovm-demo-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ../../prometheus/alerts.yaml:/etc/prometheus/alerts.yaml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
      - --log.level=warn
    depends_on:
      - control-plane

  grafana:
    image: grafana/grafana:11.3.0
    container_name: nanovm-demo-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_LOG_LEVEL: "warn"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/nanovm.yml:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  nanovm-audit:
