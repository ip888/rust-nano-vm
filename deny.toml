# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Runs in CI on pushes to `main` and PRs targeting `main` (see
# `.github/workflows/ci.yml`). Fail the build on:
#  - any security advisory or yanked version in a dependency (RustSec)
#  - any dependency whose license isn't on the permissive allow-list below
#  - any dep pulled from an unknown git repo or registry
#
# Intentionally loose on duplicate versions (modern async Rust pulls many
# major versions transitively — we only care about this if it bloats the
# binary). Tighten to "deny" once the tree stabilizes.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
# Explicit "deny" on yanked so the policy doesn't drift with cargo-deny
# defaults across upgrades. In v2-schema, all RustSec advisory categories
# (vulnerability / unmaintained / unsound / notice) are reported by default
# and denied unless individually listed in `ignore`.
yanked = "deny"
# Override with `ignore` entries (tracking-issue required) if we
# intentionally accept a specific advisory.
ignore = []

[licenses]
version = 2
# Permissive OSS licenses compatible with our dual Apache-2.0 OR MIT.
# Every crate in the tree must match one of these; add only after a review
# of the license text. Weak-copyleft licenses (MPL-2.0, LGPL) are
# intentionally NOT listed — if something we depend on requires one, add it
# explicitly via an `exceptions` entry with a note.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.8
exceptions = []

[bans]
# Warn (don't fail) when two major versions of the same crate are in the
# tree. Common with axum / tokio ecosystems during transitions.
multiple-versions = "warn"
# Wildcards are fine for our own path-based workspace deps.
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
