# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Runs in CI on pushes to `main` and PRs targeting `main` (see
# `.github/workflows/ci.yml`). Fail the build on:
#  - any security advisory or yanked version in a dependency (RustSec)
#  - any dependency whose license isn't on the permissive allow-list below
#  - any dep pulled from an unknown git repo or registry
#
# Intentionally loose on duplicate versions (modern async Rust pulls many
# major versions transitively — we only care about this if it bloats the
# binary). Tighten to "deny" once the tree stabilizes.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
# Explicit "deny" on yanked so the policy doesn't drift with cargo-deny
# defaults across upgrades. In v2-schema, all RustSec advisory categories
# (vulnerability / unmaintained / unsound / notice) are reported by default
# and denied unless individually listed in `ignore`.
yanked = "deny"
# Override with `ignore` entries (tracking-issue required) if we
# intentionally accept a specific advisory.
ignore = [
    # Both advisories live in `rustls-webpki 0.101.7`, pulled in
    # transitively when the optional `s3` feature is built:
    # aws-sdk-s3 -> aws-smithy-http-client -> hyper-rustls 0.24 ->
    # rustls 0.21 -> rustls-webpki 0.101. The modern chain
    # (rustls 0.23 + rustls-webpki 0.103) is also in the graph; the
    # legacy chain is unused at runtime by our S3 snapshot store but
    # the audit can't tell.
    #
    #  - RUSTSEC-2026-0098: URI-name constraints were silently
    #    ignored. The library does not expose URI-name assertion at
    #    all, so this is unreachable from any caller.
    #  - RUSTSEC-2026-0099: name-constraints + wildcard SAN
    #    mishandling. Reachable only on a misissued certificate; S3
    #    / MinIO / R2 endpoints are signed by well-known issuers.
    #  - RUSTSEC-2026-0104: panic in
    #    `{Borrowed,Owned}CertRevocationList::from_der`. We never
    #    parse a CRL through webpki.
    #
    # Drop these once `aws-smithy-http-client` retires its legacy
    # rustls 0.21 connector (or a backport lands in rustls-webpki
    # 0.101.x). Re-evaluate on every aws-sdk-s3 bump.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
version = 2
# Permissive OSS licenses compatible with our dual Apache-2.0 OR MIT.
# Every crate in the tree must match one of these; add only after a review
# of the license text. Weak-copyleft licenses (MPL-2.0, LGPL) are
# intentionally NOT listed — if something we depend on requires one, add it
# explicitly via an `exceptions` entry with a note.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.8
exceptions = []

[bans]
# Warn (don't fail) when two major versions of the same crate are in the
# tree. Common with axum / tokio ecosystems during transitions.
multiple-versions = "warn"
# Wildcards are fine for our own path-based workspace deps.
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
