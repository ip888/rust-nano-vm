name: docker

# Publish container images of `nanovm-control-plane` to GitHub
# Container Registry on every semver tag push (linux/amd64 only — the
# job runs on `ubuntu-latest` with no QEMU/buildx-platforms config, so
# this is a single-arch build). Multi-arch is a follow-up that adds
# `platforms: linux/amd64,linux/arm64` + a QEMU setup step.
#
# Ships two images in parallel on every tag:
#
#   - `ghcr.io/<owner>/nanovm-control-plane`        (mock backend, default Dockerfile)
#   - `ghcr.io/<owner>/nanovm-control-plane-kvm`    (KVM backend, Dockerfile.kvm)
#
# Both are tagged with the same semver (e.g. `0.0.3`, `0.0`, `latest`)
# so callers picking one or the other only choose the suffix.
#
# Triggers on the same `v*.*.*` tag pattern as `release.yml`.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write   # required to push to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # We want both images to publish even if one fails so a hotfix
      # doesn't drag the whole release down.
      fail-fast: false
      matrix:
        include:
          # Default mock-backend image.
          - image: nanovm-control-plane
            dockerfile: ./Dockerfile
            cache_scope: mock
          # KVM-feature image — pulls in vm-kvm + seccomp deny-list.
          - image: nanovm-control-plane-kvm
            dockerfile: ./Dockerfile.kvm
            cache_scope: kvm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives both the canonical `0.0.2` semver tag and a `latest`
      # tag from the pushed git tag (e.g. `v0.0.2`). Stable
      # `major.minor` aliases (e.g. `0.0`) are tagged too so callers
      # can pin loosely.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image GHA cache scope so the mock and KVM builds don't
          # invalidate each other on every tag (their builder layers
          # differ at `cargo build --features kvm`).
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
