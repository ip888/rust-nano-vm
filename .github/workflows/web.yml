name: web

# Runs only when files under `web/` change (or this workflow itself),
# so touching Rust code doesn't spin up a Node runner. Concurrency
# group cancels superseded runs on the same branch to keep queue
# depth reasonable.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  typecheck-and-build:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Next.js 15 requires Node 18.18+. LTS 20 is the safest floor
          # (matches what the container Dockerfile pins).
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
